name: CI (docs check)

# Lightweight, auto-triggered check — separate from publish.yml/publish-maven.yml
# (tag-triggered / manual only).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  docs-version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs version consistency check
        # Source of truth = what's ACTUALLY live on Maven Central (not gradle.properties'
        # VERSION, which can be bumped locally without ever being published).
        run: |
          V=$(curl -sf "https://repo1.maven.org/maven2/dev/ffmpegkit-maintained/yt-dlp-android/maven-metadata.xml" \
            | grep -oP '<release>\K[^<]+')
          if [ -z "$V" ]; then
            echo "::error::could not fetch the current release version from Maven Central metadata"
            exit 1
          fi
          echo "Live on Maven Central: $V"
          if ! grep -q "dev.ffmpegkit-maintained:yt-dlp-android:$V" README.md; then
            echo "::error file=README.md::does not mention the Maven Central version ($V) — likely stale."
            exit 1
          fi
          echo "README.md is in sync with $V."
