name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de la release existante à publier (ex: v2.0.2)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download existing AAR from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p library/build/outputs/aar
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.aar" \
            --output library/build/outputs/aar/yt-dlp-android-release.aar
          echo "AAR downloaded:"
          ls -lh library/build/outputs/aar/

      - name: Publish to Maven Central
        run: |
          VERSION="${{ github.event.inputs.release_tag }}"
          VERSION="${VERSION#v}"
          GROUP="dev.ffmpegkit-maintained"
          ARTIFACT="yt-dlp-android"
          POM_URL="https://repo1.maven.org/maven2/${GROUP//.//}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
          if curl -sf "$POM_URL" > /dev/null 2>&1; then
            echo "Version ${VERSION} already on Maven Central — skipping."
          else
            chmod +x gradlew
            ./gradlew :library:publishAndReleaseToMavenCentral \
              --no-configuration-cache --no-daemon \
              -x :library:bundleReleaseAar
          fi
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "15567C31"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
