name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build library AAR
        run: |
          chmod +x gradlew
          ./gradlew :library:assembleRelease

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-android-${{ github.ref_name }}
          path: library/build/outputs/aar/yt-dlp-android-release.aar

      - name: Publish to Maven Central (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GROUP="dev.ffmpegkit-maintained"
          ARTIFACT="yt-dlp-android"
          POM_URL="https://repo1.maven.org/maven2/${GROUP//.//}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.pom"
          if curl -sf "$POM_URL" > /dev/null 2>&1; then
            echo "Version ${VERSION} already on Maven Central — skipping publish."
          else
            ./gradlew :library:publishAndReleaseToMavenCentral --no-configuration-cache --no-daemon
          fi
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "15567C31"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: library/build/outputs/aar/yt-dlp-android-release.aar
          body: |
            ## yt-dlp-android ${{ github.ref_name }} — Free version

            Android library that runs [yt-dlp](https://github.com/yt-dlp/yt-dlp) natively on Android via Chaquopy (Python 3.13 embedded). Supports 1000+ sites.

            > **⚠️ This is the free version — curl-cffi is NOT included.**
            > For TLS fingerprint impersonation (bypassing bot detection on YouTube, Instagram, etc.), the **Pro version** (`yt-dlp-android-curl`) is required.
            > → Available at [ffmpegkit.gumroad.com](https://ffmpegkit.gumroad.com/l/fsxef) · $14 individual / $36 team

            ### What's in this version
            - yt-dlp (latest) + Python 3.13 embedded via Chaquopy
            - Clean Java API: `YtDlp.init()`, `YtDlpRequest`, `YtDlpResponse`, `DownloadProgressCallback`
            - Cookie-based auth support (`--cookies`)
            - ABI: `arm64-v8a`, `x86_64`
            - **No curl-cffi** — standard HTTP only

            ### Free vs Pro
            | | Free (this) | Pro (`yt-dlp-android-curl`) |
            |---|:---:|:---:|
            | yt-dlp (1000+ sites) | ✓ | ✓ |
            | Python 3.13 embedded | ✓ | ✓ |
            | Cookie auth | ✓ | ✓ |
            | **curl-cffi — TLS impersonation** | **—** | **✓** |
            | ABI | arm64-v8a, x86_64 | arm64-v8a |
            | Distribution | JitPack (public) | GitHub Packages (token) |
            | Price | Free | $14 / $36 team |

            ### Installation
            ```groovy
            // settings.gradle
            maven { url 'https://jitpack.io' }

            // build.gradle
            implementation 'com.github.ffmpegkit-maintained:yt-dlp-android:${{ github.ref_name }}'
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
