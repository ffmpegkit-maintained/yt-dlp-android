plugins {
    id 'com.android.library'
    id 'com.chaquo.python'
    id 'maven-publish'
}

android {
    namespace 'dev.ffmpegkit_maintained.ytdlp'
    compileSdk 35

    base {
        archivesName = 'yt-dlp-android'
    }

    defaultConfig {
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName VERSION

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }

        python {
            // Local Windows dev machine : pointer vers Python 3.13 explicite.
            // CI Linux : la step setup-python expose déjà python3.13 dans le PATH.
            def localPython = new File("D:/Python313/python.exe")
            if (localPython.exists()) { buildPython localPython.absolutePath }
            version "3.13"
            pip {
                install "yt-dlp"
                install "certifi"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

publishing {
    publications {
        release(MavenPublication) {
            groupId    GROUP
            artifactId ARTIFACT
            version    VERSION
            afterEvaluate {
                from components.release
            }
        }
    }
}
