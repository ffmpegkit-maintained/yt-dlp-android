plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.lucquebec.ytdlp'
    compileSdk 35

    defaultConfig {
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId    'com.github.ffmpegkit-maintained'
                artifactId 'yt-dlp-android'
                version    '1.0.0'
            }
        }
    }
}

dependencies {
    api 'com.github.yausername:youtubedl-android:latest.release'
    // JitPack coordinates: com.github.ffmpegkit-maintained:yt-dlp-android:<version>
}
