plugins {
    id 'com.android.library'
    id 'com.chaquo.python'
    id 'com.vanniktech.maven.publish'
}

android {
    namespace 'dev.ffmpegkit_maintained.ytdlp'
    compileSdk 35

    base {
        archivesName = 'yt-dlp-android'
    }

    defaultConfig {
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName VERSION

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }

        python {
            // Local dev : set `python.executable=/path/to/python` in local.properties
            //             (gitignored, machine-specific) or the LOCAL_PYTHON env var.
            // JitPack : python-build-standalone extracted in $HOME/python/bin.
            // GitHub Actions CI : setup-python exposes python3.13 on PATH.
            def localProps = new Properties()
            def lpFile = rootProject.file("local.properties")
            if (lpFile.exists()) lpFile.withInputStream { localProps.load(it) }
            def localPythonPath = localProps.getProperty("python.executable") ?: System.getenv("LOCAL_PYTHON")
            def jitpackPython = new File("${System.getProperty('user.home')}/python/bin/python3.13")
            if      (localPythonPath && new File(localPythonPath).exists()) { buildPython localPythonPath }
            else if (jitpackPython.exists()) { buildPython jitpackPython.absolutePath }
            else                             { buildPython "python3.13" }
            version "3.13"
            pip {
                install "yt-dlp"
                install "certifi"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

}

mavenPublishing {
    coordinates("dev.ffmpegkit-maintained", "yt-dlp-android", VERSION)

    signAllPublications()
    publishToMavenCentral()

    pom {
        name = "yt-dlp-android"
        description = "Android library embedding yt-dlp via Python 3.13 (Chaquopy). 1000+ supported sites. Clean Java API. Pro version adds curl-cffi for TLS impersonation (Instagram, TikTok, YouTube)."
        inceptionYear = "2026"
        url = "https://github.com/ffmpegkit-maintained/yt-dlp-android"

        licenses {
            license {
                name = "MIT License"
                url = "https://github.com/ffmpegkit-maintained/yt-dlp-android/blob/main/LICENSE"
                distribution = "repo"
            }
        }

        developers {
            developer {
                id = "jokobee"
                name = "Jokobee"
                email = "contact@jokobee.com"
                url = "https://www.jokobee.com"
                organization = "Jokobee"
                organizationUrl = "https://www.jokobee.com"
            }
        }

        scm {
            url = "https://github.com/ffmpegkit-maintained/yt-dlp-android"
            connection = "scm:git:git://github.com/ffmpegkit-maintained/yt-dlp-android.git"
            developerConnection = "scm:git:ssh://git@github.com/ffmpegkit-maintained/yt-dlp-android.git"
        }
    }
}
