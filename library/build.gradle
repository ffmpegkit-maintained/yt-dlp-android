plugins {
    id 'com.android.library'
    id 'com.chaquo.python'
    id 'com.vanniktech.maven.publish'
}

android {
    namespace 'dev.ffmpegkit_maintained.ytdlp'
    compileSdk 35

    base {
        archivesName = 'yt-dlp-android'
    }

    defaultConfig {
        minSdk 24
        targetSdk 35
        versionCode 2
        versionName VERSION

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }

        python {
            // Windows dev : Python 3.13 local explicite.
            // JitPack : python-build-standalone extrait dans $HOME/python/bin.
            // GitHub Actions CI : setup-python expose python3.13 dans le PATH.
            def localPython   = new File("D:/Python313/python.exe")
            def jitpackPython = new File("${System.getProperty('user.home')}/python/bin/python3.13")
            if      (localPython.exists())   { buildPython localPython.absolutePath }
            else if (jitpackPython.exists()) { buildPython jitpackPython.absolutePath }
            version "3.13"
            pip {
                install "yt-dlp"
                install "certifi"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

}

mavenPublishing {
    coordinates("dev.ffmpegkit-maintained", "yt-dlp-android", VERSION)

    signAllPublications()
    publishToMavenCentral(com.vanniktech.maven.publish.SonatypeHost.CENTRAL_PORTAL)

    pom {
        name = "yt-dlp-android"
        description = "Android library embedding yt-dlp via Python 3.13 (Chaquopy). 1000+ supported sites. Clean Java API. Pro version adds curl-cffi for TLS impersonation (Instagram, TikTok, YouTube)."
        inceptionYear = "2026"
        url = "https://github.com/ffmpegkit-maintained/yt-dlp-android"

        licenses {
            license {
                name = "MIT License"
                url = "https://github.com/ffmpegkit-maintained/yt-dlp-android/blob/main/LICENSE"
                distribution = "repo"
            }
        }

        developers {
            developer {
                id = "ffmpegkit-maintained"
                name = "ffmpegkit-maintained"
                url = "https://github.com/ffmpegkit-maintained"
            }
        }

        scm {
            url = "https://github.com/ffmpegkit-maintained/yt-dlp-android"
            connection = "scm:git:git://github.com/ffmpegkit-maintained/yt-dlp-android.git"
            developerConnection = "scm:git:ssh://git@github.com/ffmpegkit-maintained/yt-dlp-android.git"
        }
    }
}
